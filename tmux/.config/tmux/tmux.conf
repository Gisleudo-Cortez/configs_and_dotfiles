# =============================================================================
# tmux configuration — Nero's setup
# Path: ~/.config/tmux/tmux.conf
# tmux 3.6+ | Fish shell | Kitty terminal | Wayland | Arch Linux
# =============================================================================

# ---------------------------------------------------------------------------
# PREFIX KEY
# ---------------------------------------------------------------------------
# Default Ctrl-b conflicts with Vim page-up. Ctrl-a is the screen tradition
# and works well — when you need literal Ctrl-a in a terminal app, either
# press it twice (tmux passes it through) or wait 250ms.
set-option -g prefix C-a
unbind-key C-b
bind-key C-a send-prefix

# Reduce prefix timeout (ms) so bare Ctrl-a reaches apps faster
set-option -g escape-time 250

# ---------------------------------------------------------------------------
# RELOAD CONFIG (prefix r)
# ---------------------------------------------------------------------------
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded ✓"

# ---------------------------------------------------------------------------
# INDEXING: start windows at 1 (not 0, which is unintuitive)
# ---------------------------------------------------------------------------
set-option -g base-index 1
set-window-option -g pane-base-index 1

# ---------------------------------------------------------------------------
# TRUE COLOR + TERMINAL OVERRIDES
# ---------------------------------------------------------------------------
# Kitty supports true color. Force tmux to advertise it.
set-option -g default-terminal "tmux-256color"
set-option -ga terminal-overrides ",*256col*:Tc"
set-option -ga terminal-overrides ",xterm-kitty:Tc"

# ---------------------------------------------------------------------------
# MOUSE SUPPORT
# ---------------------------------------------------------------------------
# Enable mouse: scroll, select pane, resize pane, select window from status
set-option -g mouse on

# ---------------------------------------------------------------------------
# VISUAL BELL (no audio)
# ---------------------------------------------------------------------------
set-option -g visual-bell off
set-option -g bell-action none

# ---------------------------------------------------------------------------
# HISTORY / SCROLLBACK
# ---------------------------------------------------------------------------
# 50,000 lines per pane — large enough for long builds/logs
set-option -g history-limit 50000

# ---------------------------------------------------------------------------
# COPY MODE: Vi keys (consistent with Neovim)
# ---------------------------------------------------------------------------
set-window-option -g mode-keys vi

# Copy-paste with system clipboard (Wayland via wl-copy/wl-paste)
# Prefix = will show a buffer picker
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# Pipe tmux buffer to system clipboard
bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "wl-copy"
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "wl-copy"

# Paste from system clipboard (prefix Ctrl-v)
bind C-v run "wl-paste --no-newline | tmux load-buffer - ; tmux paste-buffer"

# ---------------------------------------------------------------------------
# PANE SPLITTING (| and - feel more natural than " and %)
# ---------------------------------------------------------------------------
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# ---------------------------------------------------------------------------
# PANE NAVIGATION (Vim-style hjkl, no prefix needed with Alt)
# ---------------------------------------------------------------------------
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Alt+hjkl without prefix for fast navigation
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# ---------------------------------------------------------------------------
# PANE RESIZING (prefix H/J/K/L — uppercase = resize)
# ---------------------------------------------------------------------------
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ---------------------------------------------------------------------------
# WINDOW MANAGEMENT
# ---------------------------------------------------------------------------
# prefix c  — new window in same dir
# prefix ,  — rename window
# prefix &  — kill window (asks for confirmation)
# prefix p  — previous window
# prefix n  — next window
# prefix 1-9 — jump to window by number
bind c new-window -c "#{pane_current_path}"

# Quick last-window toggle (prefix Tab)
bind Tab last-window

# Reorder windows with prefix < and >
bind -r "<" swap-window -d -t -1
bind -r ">" swap-window -d -t +1

# ---------------------------------------------------------------------------
# SESSION MANAGEMENT
# ---------------------------------------------------------------------------
# prefix s — choose session from tree (visual picker)
# prefix $ — rename current session
# prefix d — detach from session
bind s choose-tree -Zs

# Switch to last session instantly
bind S switch-client -l

# ---------------------------------------------------------------------------
# STATUS BAR — Minimal, informative, bottom
# ---------------------------------------------------------------------------
set-option -g status-position bottom
set-option -g status-style "bg=default,fg=colour244"
set-option -g status-left-length 30
set-option -g status-right-length 80

# Left: session name
set-option -g status-left "#[fg=colour39,bold]#S #[fg=colour244]│ "

# Right: date/time + host
set-option -g status-right "#[fg=colour244]%Y-%m-%d %H:%M #[fg=colour39]│ #[fg=colour244]#h "

# Window list in the middle
set-window-option -g window-status-format "#[fg=colour244]#I:#W"
set-window-option -g window-status-current-format "#[fg=colour39,bold]#I:#W"
set-window-option -g window-status-separator " "

# Activity monitor: highlight windows with output
set-window-option -g monitor-activity on
set-option -g visual-activity off

# ---------------------------------------------------------------------------
# FOCUS EVENTS (for Neovim focus detection)
# ---------------------------------------------------------------------------
set-option -g focus-events on

# ---------------------------------------------------------------------------
# AGGRESSIVE RESIZE (rebalance panes on window resize)
# ---------------------------------------------------------------------------
set-window-option -g aggressive-resize on

# ---------------------------------------------------------------------------
# FASTER REPEAT for resize keys
# ---------------------------------------------------------------------------
set-option -g repeat-time 1000

# ---------------------------------------------------------------------------
# POPUP HELP (prefix ? shows keybindings, prefix ~ shows messages)
# ---------------------------------------------------------------------------

# ---------------------------------------------------------------------------
# PLUGIN MANAGER: TPM (Tmux Plugin Manager)
# ---------------------------------------------------------------------------
# Install TPM once:
#   git clone https://github.com/tmux-plugins/tpm ~/.config/tmux/plugins/tpm
#
# Then prefix I (capital I) to install plugins, prefix U to update.

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# --- tmux-resurrect settings ---
# Restore vim/neovim sessions (if vim session files exist)
set -g @resurrect-strategy-vim 'session'
set -g @resurrect-strategy-nvim 'session'
# Restore pane contents (slow on large sessions, disable if annoying)
set -g @resurrect-capture-pane-contents 'on'
# Save/restore working directories
set -g @resurrect-save-shell-history 'on'

# --- tmux-continuum settings ---
# Auto-save every 15 minutes
set -g @continuum-save-interval '15'
# Auto-restore on tmux server start (i.e., after reboot)
set -g @continuum-restore 'on'

# Initialize TMUX plugin manager (keep this at the very bottom)
run '~/.config/tmux/plugins/tpm/tpm'
