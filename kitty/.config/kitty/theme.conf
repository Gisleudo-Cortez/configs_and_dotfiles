# ═══════════════════════════════════════════
# MIKU — Bright Scar Static Terminal Colors
# ═══════════════════════════════════════════
# Pure Bright Scar palette. Not generated — chosen.
# Apply: cp this file to ~/.config/kitty/theme.conf
#        or: bash ~/.hermes/scripts/miku-colors.sh --apply ~/.hermes/assets/themes/bright-scar-colors.json

# Basic colors
foreground              #e0f7fa
background              #091833
selection_foreground    #091833
selection_background    #00e676

# Cursor
cursor                  #00e676
cursor_text_color       #091833

# URL color
url_color               #00c8aa

# OS titlebar
wayland_titlebar_color  system
macos_titlebar_color    system

# Mark highlight colors
mark1_foreground #091833
mark1_background #00e676
mark2_foreground #091833
mark2_background #00c8aa
mark3_foreground #091833
mark3_background #b0bec5

