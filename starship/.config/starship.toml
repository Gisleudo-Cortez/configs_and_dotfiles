continuation_prompt = 'в–¶в–¶ '

[character]
success_symbol = "[ оҳӮ ](bold fg:#00e676)"
error_symbol = "[ Failed вһӨ ](blink fg:#ff8c00)"

[directory]
disabled = false
format = "[$path](bold fg:#00c8aa)"
truncate_to_repo = false
truncation_length = 0
home_symbol = "оҳ—"

[cmd_duration]
min_time = 0
format = '[[ $duration ](fg:#ffd54f bold)]($style)'
style = ""
show_notifications = true

[git_branch]
format = " [ оӮ  $branch](fg:#80cbc4)"

[git_status]
ahead = 'вҮЎ${count}'
behind = 'вҮЈ${count}'
diverged = 'вҮ•вҮЎ${ahead_count}вҮЈ${behind_count}'
format = '[[(оӘ„ $all_status$ahead_behind )](fg:#40c4ff)]($style)'
style = "bg:#0d2247"

[time]
disabled = false
format = '[[ пҗә $time ](fg:#80cbc4)]($style)'
time_format = '%H:%M:%S'

# в”Җв”Җ Language modules вҖ” bright scar accents в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ

