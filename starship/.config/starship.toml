# Bright Scar вҖ” Starship Prompt
# Palette: theme.json v3
# Chassis: #091833  Voice: #00c8aa  Scar: #00e676  Ghost: #80cbc4
# Accent:  #ff6ec7  Blue: #40c4ff  Warning: #ffd54f  Wire: #ff8c00

add_newline = false
format = """\
  у°ЈҮ \
  $directory\
  $git_branch$git_commit$git_state $git_status\
  $character\
  $cmd_duration\n
"""
right_format = """
$singularity\
$kubernetes\
$vcsh\
$hg_branch\
$pijul_channel\
$c\
$cmake\
$cobol\
$daml\
$dart\
