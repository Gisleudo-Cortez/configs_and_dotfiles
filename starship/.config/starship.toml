# Bright Scar — Starship Prompt
# Palette: theme.json v3
# Chassis: #091833  Voice: #00c8aa  Scar: #00e676  Ghost: #80cbc4
# Accent:  #ff6ec7  Blue: #40c4ff  Warning: #ffd54f  Wire: #ff8c00

add_newline = false
format = """\
  󰣇 \
  $directory\
  $git_branch$git_commit$git_state $git_status\
  $character\
  $cmd_duration\n
"""
right_format = """
$python\
$rust\
$nodejs\
$golang\
$lua\
$java\
$cpp\
$pixi\
$conda\
$nix_shell\
$memory_usage\
$status\
$os\
$time"""

continuation_prompt = '▶▶ '

[character]
success_symbol = "[  ](bold fg:#00e676)"
error_symbol = "[ Failed ➤ ](blink fg:#ff8c00)"

[directory]
disabled = false
format = "[$path](bold fg:#00c8aa)"
truncate_to_repo = false
truncation_length = 0
home_symbol = ""

[cmd_duration]
min_time = 0
format = '[[ $duration ](fg:#ffd54f bold)]($style)'
style = ""
show_notifications = true

[git_branch]
format = " [  $branch](fg:#80cbc4)"

[git_status]
ahead = '⇡${count}'
behind = '⇣${count}'
diverged = '⇕⇡${ahead_count}⇣${behind_count}'
format = '[[( $all_status$ahead_behind )](fg:#40c4ff)]($style)'
style = "bg:#0d2247"

[time]
disabled = false
format = '[[  $time ](fg:#80cbc4)]($style)'
time_format = '%H:%M:%S'

# ── Language modules — bright scar accents ──────────────────────────

[deno]
format = " [deno](italic) [ ](bold fg:#00e676)"
version_format = "${raw}"

[lua]
format = " [lua](italic) [${symbol}](bold fg:#ff6ec7)"
symbol = "⨀ "
version_format = "${raw}"

[nodejs]
detect_extensions = []
detect_files = ["package-lock.json", "yarn.lock"]
detect_folders = ["node_modules"]
format = "[ ](bold fg:#00e676)"
version_format = "${raw}"

[python]
format = "[${symbol}(${virtualenv}) ${version}](bold fg:#ff6ec7)"
symbol = "[ ](bold fg:#40c4ff)"
version_format = "${raw}"

[ruby]
format = " [rb](italic) [${symbol}](bold fg:#ff6ec7)"
symbol = " "
version_format = "${raw}"

[rust]
