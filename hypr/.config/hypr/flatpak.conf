# Flatpak integration
# Ensures XDG_DATA_DIRS includes flatpak exports so app launchers (rofi, etc.)
# discover flatpak-provided .desktop files and icons.
# Profile.d script (/etc/profile.d/flatpak.sh) handles this for shell sessions,
# but Hyprland may not source it depending on how the session is launched.

env = XDG_DATA_DIRS, /var/lib/flatpak/exports/share:/home/nero/.local/share/flatpak/exports/share:/usr/local/share:/usr/share:/home/nero/.nix-profile/share:/nix/var/nix/profiles/default/share