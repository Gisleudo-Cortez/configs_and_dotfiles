# Script from https://wiki.hyprland.org/Configuring/Uncommon-tips--tricks/#toggle-animationsbluretc-hotkey

$WORKFLOW_ICON=  # this is an indicator that can be parsed by quickshell or other status bars
$WORKFLOW_DESCRIPTION = Emphasis on performance and disabling compositors expensive features

decoration {
    shadow {        
        enabled = 0
    }
    blur {
        enabled = 0
        xray = 1
    }
    rounding = 0 
    active_opacity = 1 
    inactive_opacity = 1 
    fullscreen_opacity = 1 
}

general {
    gaps_in = 0
    gaps_out = 0
    border_size = 1
}

animations:enabled = 0

# Allow tearing for fullscreen games (requires allow_tearing = true in general {})
# gamescope: Steam Gamepad Mode compositor; steam_app_.*: Steam's per-app window class
windowrulev2 = immediate, class:^(gamescope|steam_app_.*)$

layerrule {
    match:namespace = ^quickshell:
    no_anim = true
}

layerrule {
    match:namespace = swaync-notification-window
    no_anim = true
}

layerrule {
    match:namespace = swww-daemon
    no_anim = true
}

layerrule {
    match:namespace = rofi
    no_anim = true
}

