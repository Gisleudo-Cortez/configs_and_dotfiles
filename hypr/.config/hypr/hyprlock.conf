# Baseline placeholder configuration

background {
    monitor =
    path = screenshot   # Takes a screenshot of the current workspace
    color = rgba(25, 20, 20, 1.0)
    blur_passes = 2     # Lightweight blur for aesthetics without heavy GPU cost
    blur_size = 7
    noise = 0.0117
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

input-field {
    monitor =
    size = 250, 50
    outline_thickness = 2
    dots_size = 0.33 
    dots_spacing = 0.15 
    dots_center = true
    dots_rounding = -1
    outer_color = rgb(151515)
    inner_color = rgb(200, 200, 200)
    font_color = rgb(10, 10, 10)
    fade_on_empty = true
    fade_timeout = 1000
    placeholder_text = <i>Input Password...</i>
    hide_input = false
    rounding = -1
    check_color = rgb(204, 136, 34)
    fail_color = rgb(204, 34, 34)
    fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i>
    fail_transition = 300
    position = 0, -20
    halign = center
    valign = center
}

label {
    monitor =
    text = $TIME
    text_align = center
    color = rgba(200, 200, 200, 1.0)
    font_size = 65
    font_family = CaskaydiaCove Nerd Font
    position = 0, 80
    halign = center
    valign = center
}

label {
    monitor =
    text = Locked: $USER
    text_align = center
    color = rgba(200, 200, 200, 1.0)
    font_size = 14
    font_family = CaskaydiaCove Nerd Font
    position = 0, -80
    halign = center
    valign = center
}
