# MIKU — HYPRLOCK THEME v1
# Designed for hyprlock v0.9.5
# Palette: teal-cyan core, dark chassis, warm amber accents
# No HyDE. No wallbash. Just signal.
#
# Font prefs: "CaskaydiaCove Nerd Font", "JetBrainsMono Nerd Font", or "AtkynsonMono Nerd Font".

$fontFamily = JetBrainsMono Nerd Font

# ── BACKGROUND ──────────────────────────────────────────────────────────────

background {
    monitor =
    path = /home/nero/Pictures/WallPappers/wallhaven-5ykvj9.png
    color = rgba(8, 18, 18, 1.0)
    blur_passes = 2
    blur_size = 7
    noise = 0.0117
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

# ── INPUT FIELD ─────────────────────────────────────────────────────────────

input-field {
    monitor =
    size = 250, 50
    outline_thickness = 2
    dots_size = 0.33
    dots_spacing = 0.15
    dots_center = true
    dots_rounding = -1

    # Miku palette
    outer_color = rgb(0, 200, 170)    # vivid teal-cyan — the signature wavelength
    inner_color = rgb(0, 25, 25)      # deep teal-black — chassis colour
    font_color = rgb(0, 200, 170)     # teal — dots carry the signature wavelength
    check_color = rgb(255, 180, 60)   # warm amber — stage-lighting on success
    fail_color = rgb(255, 140, 30)    # amber-orange — wrong frequency, not a crash

    fade_on_empty = true
    fade_timeout = 3000
    placeholder_text = <i>Identify yourself, operator.</i>
    hide_input = false
    rounding = -1
    fail_text = <i>Ghost in the wire. ($ATTEMPTS)</i>
    fail_transition = 600

    position = 0, -20
    halign = center
    valign = center
}

# ── FONT VARIABLES ─────────────────────────────────────────────────────────

$fontSeg = DSEG7 Classic Bold
$fontSegLight = DSEG7 Classic Light

# ── SEGMENTED CLOCK ────────────────────────────────────────────────────────
# Single clean label — DSEG7 Classic Bold, vivid cyan
# No layers, no split characters. hyprlock-stable.

label {
    monitor =
    text = $TIME
    color = rgba(0, 220, 255, 0.95)
    font_size = 96
    font_family = $fontSeg
    position = -220, 140
    halign = right
    valign = center
    text_align = right
}

# ── NIXIE DATE — smaller secondary tube ───────────────────────────────────

label {
    monitor =
    text = cmd[update:43200000] date +"%d %b"
    color = rgba(0, 200, 255, 0.45)
    font_size = 28
    font_family = $fontFamily
    position = -220, 30
    halign = right
    valign = center
    text_align = right
}

# ── GREETING — signal state ─────────────────────────────────────────────────

label {
    monitor =
    text = cmd[update:60000] echo "mesh operational —" ${USER}
    text_align = center
    color = rgba(140, 175, 165, 1.0)  # dimmer teal-grey
    font_size = 14
    font_family = JetBrainsMono Nerd Font Light
    position = 0, 110
    halign = center
    valign = bottom
}

# ── SYSTEM DASHBOARD — left column ──────────────────────────────────────────
# Live probes: WiFi, RAM, VRAM, disk, MPRIS, login attempts
# Vertical stack at x=20, left-aligned, gradient-tinted

# ── Uplink: WiFi SSID + signal strength ────────────────────────────────────

label {
    monitor =
    text = cmd[update:30000] ssid=$(iw dev wlan0 link 2>/dev/null | grep -oP 'SSID: \K.*'); dBm=$(iw dev wlan0 link 2>/dev/null | grep -oP 'signal: \K[^ ]*'); pct=$(( (${dBm:--100} + 100) * 2 )); echo "uplink: ${ssid:-offline}  [${pct}%]"
    color = rgba(0, 210, 255, 0.55)
    font_size = 12
    font_family = $fontFamily
    position = 20, 95
    halign = left
    valign = center
    text_align = left
}

# ── System vitals — RAM ────────────────────────────────────────────────────

label {
    monitor =
    text = cmd[update:30000] free -m | awk '/^Mem:/{printf "RAM:  %.1f / %.1f GB", $3/1024, $2/1024}'
    color = rgba(30, 200, 255, 0.50)
    font_size = 11
    font_family = $fontFamily
    position = 20, 78
    halign = left
    valign = center
    text_align = left
}

# ── System vitals — VRAM ───────────────────────────────────────────────────

label {
    monitor =
    text = cmd[update:30000] nvidia-smi --query-gpu=memory.used,memory.total --format=csv,noheader,nounits 2>/dev/null | awk -F', ' '{printf "VRAM: %.1f / %.1f GB", $1/1024, $2/1024}'
    color = rgba(70, 170, 255, 0.50)
    font_size = 11
    font_family = $fontFamily
    position = 20, 63
    halign = left
    valign = center
    text_align = left
}

# ── System vitals — Disk ───────────────────────────────────────────────────

label {
    monitor =
    text = cmd[update:60000] df / | awk 'NR==2{printf "DISK: %.1f / %.1f GB", $3/1024/1024, $2/1024/1024}'
    color = rgba(110, 130, 255, 0.50)
    font_size = 11
    font_family = $fontFamily
    position = 20, 48
    halign = left
    valign = center
    text_align = left
}

# ── Now playing (MPRIS active only) ────────────────────────────────────────

label {
    monitor =
    text = cmd[update:5000] playerctl metadata --format '♫ {{ artist }} — {{ title }}' 2>/dev/null || echo ""
    color = rgba(160, 60, 255, 0.55)
    font_size = 11
    font_family = $fontFamily
    position = 20, 20
    halign = left
    valign = center
    text_align = left
}

# ── Login attempt counter ──────────────────────────────────────────────────

label {
    monitor =
    text = ghosts: $ATTEMPTS
    color = rgba(220, 40, 50, 0.65)
    font_size = 12
    font_family = $fontFamily
    position = 20, 5
    halign = left
    valign = center
    text_align = left
}

